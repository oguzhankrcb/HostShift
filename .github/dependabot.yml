version: 2

updates:
  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: weekly
    labels:
      - dependencies
      - go

  - package-ecosystem: npm
    directory: /docs-site
    schedule:
      interval: weekly
    labels:
      - dependencies
      - documentation

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    labels:
      - dependencies
      - github-actions
