name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * 1"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.x"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm test
      - run: make test-go
      - run: make build
      - run: make test-integration-docker
      - run: make test-e2e-vm
      - run: make release-snapshot

  docker-matrix:
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.x"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: make build
      - run: HOSTSHIFT_RUN_DOCKER_MATRIX=1 make test-integration-docker

  vm-e2e-apply:
    if: github.event_name == 'workflow_dispatch'
    runs-on: macos-15
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.x"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: brew install lima qemu
      - run: make build
      - run: HOSTSHIFT_RUN_VM_E2E=1 HOSTSHIFT_VM_LIMA_VM_TYPE=qemu bash tests/e2e/vm/run-vm-e2e.sh --apply
      - name: Upload Lima logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: lima-vm-e2e-logs
          path: |
            ~/.lima/**/ha.stderr.log
            ~/.lima/**/serial*.log
