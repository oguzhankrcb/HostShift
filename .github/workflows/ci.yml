name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
    inputs:
      run_vm_apply:
        description: "Run the self-hosted macOS VM apply gate"
        required: false
        type: boolean
        default: false
  schedule:
    - cron: "0 3 * * 1"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Scan Git history for secrets
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.x"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm --prefix docs-site ci
      - run: npm run docs:build
      - run: npm run docs:compose:config
      - run: make test-go
      - run: make build
      - run: make test-integration-docker
      - run: make test-e2e-vm
      - run: make release-snapshot

  docker-matrix:
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.x"
      - run: make build
      - run: HOSTSHIFT_RUN_DOCKER_MATRIX=1 make test-integration-docker

  vm-e2e-preflight:
    if: github.event_name == 'workflow_dispatch'
    runs-on: macos-15
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.x"
      - run: brew install lima
      - run: make build
      - run: HOSTSHIFT_RUN_VM_E2E=1 make test-e2e-vm

  vm-e2e-apply-self-hosted:
    if: github.event_name == 'workflow_dispatch' && inputs.run_vm_apply
    runs-on: [self-hosted, macOS, hostshift-vm]
    timeout-minutes: 240
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.x"
      - run: make build
      - run: HOSTSHIFT_RUN_VM_E2E=1 bash tests/e2e/vm/run-vm-e2e.sh --apply
      - name: Upload Lima logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: lima-vm-e2e-logs
          path: |
            ~/.lima/**/ha.stderr.log
            ~/.lima/**/serial*.log
