name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  actions: read
  contents: write
  id-token: write
  attestations: write

jobs:
  quick-gates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Scan Git history for secrets
        uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26.x"
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
      - run: npm --prefix docs-site ci
      - run: npm run docs:build
      - run: npm run docs:compose:config
      - run: make test-go
      - run: make build
      - run: make test-integration-docker
      - run: make test-e2e-vm
      - run: make release-snapshot

  docker-matrix:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26.x"
      - run: make build
      - run: HOSTSHIFT_RUN_DOCKER_MATRIX=1 make test-integration-docker

  vm-e2e-preflight:
    runs-on: macos-15
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26.x"
      - run: brew install lima
      - run: make build
      - run: HOSTSHIFT_RUN_VM_E2E=1 make test-e2e-vm

  vm-e2e-apply-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Require successful real VM apply for this commit
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          run_url="$(gh run list \
            --repo "$GITHUB_REPOSITORY" \
            --workflow vm-e2e-apply.yml \
            --commit "$GITHUB_SHA" \
            --event workflow_dispatch \
            --status success \
            --limit 20 \
            --json url \
            --jq '.[0].url // empty')"
          if [ -z "$run_url" ]; then
            echo "No successful VM E2E Apply workflow run exists for commit $GITHUB_SHA." >&2
            echo "Start the offline-by-default self-hosted hostshift-vm runner and dispatch vm-e2e-apply.yml for this exact commit before releasing." >&2
            exit 1
          fi
          echo "Verified real VM apply gate: $run_url"

  release:
    needs:
      - quick-gates
      - docker-matrix
      - vm-e2e-preflight
      - vm-e2e-apply-gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26.x"
      - uses: sigstore/cosign-installer@v3
      - uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: v2.17.0
          args: ${{ github.event_name == 'workflow_dispatch' && 'release --snapshot --clean' || 'release --clean' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Generate SPDX SBOM
        run: go run ./cmd/hostshift sbom --output dist/hostshift.sbom.spdx.json
      - name: Keyless-sign release checksums
        run: |
          cosign sign-blob --yes \
            --output-signature dist/checksums.txt.sig \
            --output-certificate dist/checksums.txt.pem \
            dist/checksums.txt
      - name: Upload signed metadata to GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "$GITHUB_REF_NAME" \
            dist/checksums.txt.sig \
            dist/checksums.txt.pem \
            dist/hostshift.sbom.spdx.json \
            --clobber
      - uses: actions/attest-build-provenance@v4
        with:
          subject-path: |
            dist/*
      - uses: actions/upload-artifact@v7
        with:
          name: hostshift-release-artifacts
          path: |
            dist/*
