name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  quick-gates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.x"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm --prefix docs-site ci
      - run: npm run docs:build
      - run: npm run docs:compose:config
      - run: make test-go
      - run: make build
      - run: make test-integration-docker
      - run: make test-e2e-vm
      - run: make release-snapshot

  docker-matrix:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.x"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: make build
      - run: HOSTSHIFT_RUN_DOCKER_MATRIX=1 make test-integration-docker

  vm-e2e-preflight:
    runs-on: macos-15
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.x"
      - run: brew install lima
      - run: make build
      - run: HOSTSHIFT_RUN_VM_E2E=1 make test-e2e-vm

  release:
    needs:
      - quick-gates
      - docker-matrix
      - vm-e2e-preflight
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.x"
      - uses: sigstore/cosign-installer@v3
      - uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: latest
          args: ${{ github.event_name == 'workflow_dispatch' && 'release --snapshot --clean' || 'release --clean' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Keyless-sign release checksums
        run: |
          cosign sign-blob --yes \
            --output-signature dist/checksums.txt.sig \
            --output-certificate dist/checksums.txt.pem \
            dist/checksums.txt
      - name: Upload checksum signature to GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "$GITHUB_REF_NAME" dist/checksums.txt.sig dist/checksums.txt.pem --clobber
      - uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: hostshift-release-artifacts
          path: |
            dist/*
