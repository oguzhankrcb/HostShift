name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.x"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm test
      - run: make test-go
      - run: make test-integration-docker
      - run: make test-e2e-vm
      - run: node scripts/make-sbom.mjs dist/hostshift.sbom.spdx.json
      - uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/upload-artifact@v4
        with:
          name: hostshift-sbom
          path: dist/hostshift.sbom.spdx.json
