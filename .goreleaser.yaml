version: 2

project_name: hostshift

before:
  hooks:
    - go mod tidy
    - go run ./cmd/hostshift sbom --output dist/hostshift.sbom.spdx.json

builds:
  - id: hostshift
    main: ./cmd/hostshift
    binary: hostshift
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X github.com/oguzhankaracabay/hostshift/internal/version.Version={{ .Version }}

archives:
  - id: hostshift
    ids:
      - hostshift
    formats:
      - tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - LICENSE
      - README.md
      - SECURITY.md
      - docs/*
      - examples/*

checksum:
  name_template: checksums.txt

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
